<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Yonatan's Learning">
    <title>Yonatan's Learning (B&W)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Rounded', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            color: black;
        }

        .screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 10px;
            padding-top: env(safe-area-inset-top, 10px);
            padding-bottom: env(safe-area-inset-bottom, 10px);
            padding-left: env(safe-area-inset-left, 10px);
            padding-right: env(safe-area-inset-right, 10px);
            background: white;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-categories {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 800px;
        }

        .category-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: clamp(160px, 42vw, 320px);
            height: clamp(200px, 50vw, 380px);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            border: 8px solid black;
            box-shadow: 8px 8px 0 black;
        }

        .category-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0 black;
        }

        .category-icon {
            font-size: clamp(90px, 22vw, 160px);
        }

        #numbers-menu .header {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            left: 20px;
            width: auto;
            gap: 15px;
            justify-content: flex-start;
        }

        .game-modes {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            cursor: pointer;
        }

        .mode-icon {
            width: clamp(120px, 30vw, 200px);
            height: clamp(120px, 30vw, 200px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(60px, 15vw, 100px);
            background: white;
            border: 6px solid black;
            box-shadow: 6px 6px 0 black;
            transition: all 0.15s ease;
        }

        .mode-btn:active .mode-icon {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0 black;
        }

        .mode-label {
            font-size: clamp(24px, 6vw, 40px);
            font-weight: 700;
            color: black;
        }

        /* Language Selector */
        .lang-selector {
            position: absolute;
            top: max(20px, env(safe-area-inset-top));
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid black;
            font-size: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            background: white;
            box-shadow: 4px 4px 0 black;
        }

        .lang-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 black;
        }

        .lang-btn.active {
            background: #ddd;
            border-width: 5px;
        }

        /* Reading Game Styles */
        .word-display {
            font-size: clamp(80px, 22vw, 150px);
            font-weight: 800;
            color: black;
            direction: rtl;
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 30px;
            border: 8px solid black;
            cursor: pointer;
            transition: all 0.1s ease;
            min-width: 320px;
            box-shadow: 8px 8px 0 black;
        }

        .word-display:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0 black;
        }

        .word-nav {
            display: flex;
            gap: 30px;
            margin-top: 40px;
        }

        .nav-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 5px solid black;
            font-size: 50px;
            cursor: pointer;
            transition: all 0.1s ease;
            background: white;
            box-shadow: 5px 5px 0 black;
        }

        .nav-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 black;
        }

        .play-word-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid black;
            font-size: 70px;
            cursor: pointer;
            transition: all 0.1s ease;
            background: white;
            margin: 20px 0;
            box-shadow: 6px 6px 0 black;
        }

        .play-word-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0 black;
        }

        .word-progress {
            margin-top: 20px;
            font-size: 28px;
            color: black;
            font-weight: 600;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .home-btn, .refresh-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid black;
            font-size: 36px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s ease;
            background: white;
            box-shadow: 4px 4px 0 black;
        }

        .home-btn:active, .refresh-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 black;
        }

        .score {
            background: white;
            padding: 12px 30px;
            border-radius: 20px;
            border: 4px solid black;
            font-size: 32px;
            font-weight: 700;
            color: black;
            box-shadow: 4px 4px 0 black;
        }

        .score::before {
            content: '★ ';
        }

        /* Number Explore */
        .number-display {
            font-size: clamp(120px, 35vw, 220px);
            font-weight: 800;
            color: black;
            margin: 20px 0;
            text-shadow: 6px 6px 0 #888;
            transition: transform 0.2s ease;
        }

        .number-display.pop {
            animation: numberPop 0.3s ease-out;
        }

        @keyframes numberPop {
            0% { transform: scale(0.5); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .objects-display {
            font-size: clamp(50px, 12vw, 80px);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        .object-item {
            animation: popIn 0.4s ease-out backwards;
        }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .number-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 600px;
            margin-top: auto;
        }

        .number-tile {
            aspect-ratio: 1;
            border-radius: 20px;
            border: 5px solid black;
            font-size: clamp(36px, 10vw, 60px);
            font-weight: 700;
            color: black;
            background: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 5px 5px 0 black;
        }

        .number-tile:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 black;
        }

        /* Counting & Math Games */
        .question {
            font-size: clamp(32px, 8vw, 55px);
            font-weight: 700;
            color: black;
            text-align: center;
            margin: 10px 0;
            animation: questionPop 0.5s ease-out;
        }

        @keyframes questionPop {
            0% { transform: scale(0.5); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animals-container, .equation-visual {
            background: white;
            border-radius: 30px;
            border: 6px solid black;
            padding: 30px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            box-shadow: 6px 6px 0 black;
        }

        .animal-item, .math-object {
            font-size: clamp(60px, 18vw, 100px);
            animation: popInBounce 0.5s ease-out backwards;
        }

        @keyframes popInBounce {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .animal-item {
            transition: transform 0.15s ease;
        }

        .animal-item:hover {
            transform: scale(1.15);
        }

        .equation-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            border: 5px solid black;
            margin: 20px 0;
            box-shadow: 5px 5px 0 black;
        }

        .equation-num {
            font-size: clamp(50px, 14vw, 85px);
            font-weight: 800;
            color: black;
        }

        .equation-op {
            font-size: clamp(45px, 12vw, 75px);
            font-weight: 700;
            color: black;
        }

        .answer-buttons {
            display: flex;
            gap: 20px;
            margin-top: auto;
            flex-wrap: wrap;
            justify-content: center;
        }

        .answer-btn {
            width: clamp(100px, 25vw, 150px);
            height: clamp(100px, 25vw, 150px);
            border-radius: 50%;
            border: 6px solid black;
            font-size: clamp(48px, 12vw, 75px);
            font-weight: 700;
            color: black;
            background: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 6px 6px 0 black;
        }

        .answer-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0 black;
        }

        .answer-btn.wrong {
            animation: wrongShake 0.4s ease-in-out;
            background: #ddd !important;
            box-shadow: 3px 3px 0 #666 !important;
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-8px); }
            80% { transform: translateX(8px); }
        }

        /* Celebration */
        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .celebration.active {
            display: flex;
            animation: celebrationPop 0.3s ease-out;
        }

        @keyframes celebrationPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .celebration-text {
            font-size: 70px;
            font-weight: 900;
            color: black;
            margin-top: 20px;
            text-shadow: 6px 6px 0 #888;
            animation: celebrateTextBounce 0.5s ease-out;
        }

        @keyframes celebrateTextBounce {
            0% { transform: scale(0.3); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .star-burst {
            position: absolute;
            font-size: 50px;
            color: black;
            animation: starBurst 0.6s ease-out forwards;
        }

        @keyframes starBurst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        .confetti {
            position: absolute;
            font-size: 30px;
            animation: confettiFall linear forwards;
        }

        .confetti.star::before { content: '★'; }
        .confetti.circle::before { content: '●'; }
        .confetti.diamond::before { content: '◆'; }
        .confetti.heart::before { content: '♥'; }

        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
        }

        /* Prompt text */
        .tap-prompt {
            font-size: 100px;
            opacity: 0.5;
            margin: 40px 0;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* 3D Woolly Container */
        #woolly-3d-container {
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
        }

        #woolly-3d-container canvas {
            display: block;
        }

        /* Celebration 3D Woolly */
        #woolly-celebration-container {
            width: 280px;
            height: 280px;
        }

        #woolly-celebration-container canvas {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Start Screen - Main Categories -->
    <div id="start" class="screen active">
        <div id="woolly-3d-container"></div>
        <div class="main-categories">
            <div class="category-btn reading" onclick="showScreen('reading')">
                <div class="category-icon">📖</div>
            </div>
            <div class="category-btn numbers" onclick="showScreen('numbers-menu')">
                <div class="category-icon">🔢</div>
            </div>
        </div>
    </div>

    <!-- Numbers Menu Screen -->
    <div id="numbers-menu" class="screen">
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en')" id="langEn">🇺🇸</button>
            <button class="lang-btn" onclick="setLanguage('he')" id="langHe">🇮🇱</button>
        </div>
        <div class="header">
            <button class="home-btn" onclick="showScreen('start')">🏠</button>
        </div>
        <div class="game-modes">
            <div class="mode-btn" onclick="showScreen('explore')">
                <div class="mode-icon">🔢</div>
                <div class="mode-label" id="labelNumbers">Numbers</div>
            </div>
            <div class="mode-btn" onclick="showScreen('counting')">
                <div class="mode-icon">🐻</div>
                <div class="mode-label" id="labelCount">Count</div>
            </div>
            <div class="mode-btn" onclick="showScreen('math')">
                <div class="mode-icon">➕</div>
                <div class="mode-label" id="labelAdd">Add</div>
            </div>
        </div>
    </div>

    <!-- Number Explore Screen -->
    <div id="explore" class="screen">
        <div class="header">
            <button class="home-btn" onclick="goBack()">🏠</button>
            <div class="tap-prompt-text" style="font-size: 28px; font-weight: 700; color: black;" id="exploreTapText">Tap a Number!</div>
            <div style="width: 60px;"></div>
        </div>
        <div class="game-area">
            <div id="exploreDisplay" class="tap-prompt">👆</div>
            <div id="exploreObjects" class="objects-display"></div>
        </div>
        <div class="number-grid">
            <button class="number-tile" onclick="exploreNumber(1)">1</button>
            <button class="number-tile" onclick="exploreNumber(2)">2</button>
            <button class="number-tile" onclick="exploreNumber(3)">3</button>
            <button class="number-tile" onclick="exploreNumber(4)">4</button>
            <button class="number-tile" onclick="exploreNumber(5)">5</button>
            <button class="number-tile" onclick="exploreNumber(6)">6</button>
            <button class="number-tile" onclick="exploreNumber(7)">7</button>
            <button class="number-tile" onclick="exploreNumber(8)">8</button>
            <button class="number-tile" onclick="exploreNumber(9)">9</button>
            <button class="number-tile" onclick="exploreNumber(10)">10</button>
        </div>
    </div>

    <!-- Counting Game Screen -->
    <div id="counting" class="screen">
        <div class="header">
            <button class="home-btn" onclick="goBack()">🏠</button>
            <div class="score" id="countingScore">0</div>
            <button class="refresh-btn" onclick="newCountingQuestion()">🔄</button>
        </div>
        <div class="question" id="countingQuestion">How many 🐻?</div>
        <div class="game-area">
            <div class="animals-container" id="animalsContainer"></div>
        </div>
        <div class="answer-buttons" id="countingAnswers"></div>
    </div>

    <!-- Math Game Screen -->
    <div id="math" class="screen">
        <div class="header">
            <button class="home-btn" onclick="goBack()">🏠</button>
            <div class="score" id="mathScore">0</div>
            <button class="refresh-btn" onclick="newMathProblem()">🔄</button>
        </div>
        <div class="game-area">
            <div class="equation-visual" id="equationVisual"></div>
            <div class="equation-text">
                <span class="equation-num first" id="mathFirst">1</span>
                <span class="equation-op">+</span>
                <span class="equation-num second" id="mathSecond">1</span>
                <span class="equation-op">=</span>
                <span class="equation-num unknown">?</span>
            </div>
        </div>
        <div class="answer-buttons" id="mathAnswers"></div>
    </div>

    <!-- Reading Game Screen -->
    <div id="reading" class="screen">
        <div class="header">
            <button class="home-btn" onclick="goBack()">🏠</button>
            <div class="score" id="readingScore">0</div>
            <button class="refresh-btn" onclick="shuffleWords()">🔀</button>
        </div>
        <div class="game-area">
            <div class="word-display" id="wordDisplay">אמא</div>
            <button class="play-word-btn" onclick="speakCurrentWord()">▶️</button>
            <div class="word-nav">
                <button class="nav-btn" onclick="prevWord()">◀</button>
                <button class="nav-btn" onclick="nextWord()">▶</button>
            </div>
            <div class="word-progress" id="wordProgress">1 / 51</div>
        </div>
    </div>

    <!-- Celebration Overlay -->
    <div id="celebration" class="celebration">
        <div id="woolly-celebration-container"></div>
        <div class="celebration-text" id="celebrationText">★ YAY! ★</div>
    </div>

    <script>
        // Language settings
        let currentLang = localStorage.getItem('numberFunLang') || 'en';

        const translations = {
            en: {
                title: 'Number Fun!',
                numbers: 'Numbers',
                count: 'Count',
                add: 'Add',
                tapNumber: 'Tap a Number!',
                howMany: 'How many',
                greatJob: 'Great Job!',
                tryAgain: 'Try again!',
                numberWords: ['', 'One', 'Two', 'Three', 'Four', 'Five', 'Six', 'Seven', 'Eight', 'Nine', 'Ten'],
                encouragements: ['Great job!', 'Wonderful!', 'You did it!', 'Amazing!', 'Super!', 'Yay!']
            },
            he: {
                title: '!כיף מספרים',
                numbers: 'מספרים',
                count: 'ספירה',
                add: 'חיבור',
                tapNumber: '!לחץ על מספר',
                howMany: 'כמה',
                greatJob: '!כל הכבוד',
                tryAgain: 'נסה שוב',
                numberWords: ['', 'אחד', 'שתיים', 'שלוש', 'ארבע', 'חמש', 'שש', 'שבע', 'שמונה', 'תשע', 'עשר'],
                encouragements: ['יופי!', 'מעולה!', 'כל הכבוד!', 'נהדר!', 'יאיי!', 'אלוף!']
            }
        };

        // Audio playback using pre-recorded high-quality voices
        const audioCache = {};

        // Simple sound effects for B&W version (keeping audio)
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioCtx;
        }

        function playPop() {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.setTargetAtTime(0.01, now + 0.08, 0.03);
            osc.start(now);
            osc.stop(now + 0.15);
        }

        function playQuestionSound() {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            const notes = [659, 784];
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.2, now + i * 0.12);
                gain.gain.setTargetAtTime(0.01, now + i * 0.12 + 0.1, 0.05);
                osc.start(now + i * 0.12);
                osc.stop(now + i * 0.12 + 0.2);
            });
        }

        function playHappyTune() {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            const melody = [
                { freq: 523, time: 0 },
                { freq: 587, time: 0.12 },
                { freq: 659, time: 0.24 },
                { freq: 784, time: 0.36 },
                { freq: 659, time: 0.52 },
                { freq: 784, time: 0.64 },
            ];
            melody.forEach(note => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = note.freq;
                gain.gain.setValueAtTime(0.2, now + note.time);
                gain.gain.setTargetAtTime(0.01, now + note.time + 0.1, 0.05);
                osc.start(now + note.time);
                osc.stop(now + note.time + 0.2);
            });
        }

        function playHappyBaa() {
            const ctx = getAudioContext();
            const now = ctx.currentTime;
            [0, 0.25].forEach((delay, idx) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                const baseFreq = idx === 0 ? 550 : 650;
                osc.frequency.setValueAtTime(baseFreq, now + delay);
                gain.gain.setValueAtTime(0.18, now + delay);
                gain.gain.setTargetAtTime(0.01, now + delay + 0.15, 0.05);
                osc.start(now + delay);
                osc.stop(now + delay + 0.25);
            });
        }

        const WoollySounds = {
            playPop,
            playQuestionSound,
            playHappyTune,

            currentWordIndex = (currentWordIndex - 1 + hebrewWords.length) % hebrewWords.length;
            updateWordDisplay();
            WoollySounds.playPop();
        }

        function shuffleWords() {
            for (let i = hebrewWords.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [hebrewWords[i], hebrewWords[j]] = [hebrewWords[j], hebrewWords[i]];

                    span.className = 'object-item';
                    span.textContent = obj;
                    span.style.animationDelay = `${i * 0.1}s`;

        function newCountingQuestion() {
            countingAnswer = Math.floor(Math.random() * 5) + 1;
            const animal = animals[Math.floor(Math.random() * animals.length)];
            const t = translations[currentLang];

            document.getElementById('countingQuestion').textContent = `${t.howMany} ${animal}?`;
            WoollySounds.playQuestionSound();

            const container = document.getElementById('animalsContainer');
            container.innerHTML = '';
            for (let i = 0; i < countingAnswer; i++) {
                const span = document.createElement('span');
                span.className = 'animal-item';
                span.textContent = animal;
                span.style.animationDelay = `${i * 0.15}s`;
                container.appendChild(span);
            }

            let options = [countingAnswer];
            while (options.length < 3) {
                const wrong = Math.floor(Math.random() * 5) + 1;
                if (!options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);

            const answersDiv = document.getElementById('countingAnswers');
            answersDiv.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = opt;
                btn.onclick = () => checkCountingAnswer(opt, btn);
                answersDiv.appendChild(btn);

                if (currentScreen === 'math') newMathProblem();

                if (animationType === 'wave') {
                    woolly.position.y = Math.sin(time * 1.5) * 0.06;
                    headGroup.rotation.z = Math.sin(time * 2) * 0.12;
                    headGroup.rotation.x = Math.sin(time * 1.5) * 0.08;
                    earGroup.children[0].rotation.z = 0.5 + Math.sin(time * 4) * 0.35;
                    earGroup.children[1].rotation.z = -0.5 + Math.sin(time * 4 + 0.8) * 0.35;
                    rightArmGroup.rotation.z = -1.2 + Math.sin(time * 6) * 0.5;
                    rightArmGroup.rotation.x = Math.sin(time * 4) * 0.3;
                    leftArmGroup.rotation.z = Math.sin(time * 2) * 0.1;
                    tailGroup.rotation.y = Math.sin(time * 5) * 0.35;
                    bodyGroup.rotation.z = Math.sin(time * 2) * 0.04;
                } else {
                    const danceTime = time * 4;
                    const danceBounce = Math.abs(Math.sin(danceTime)) * 0.25;
                    woolly.position.y = danceBounce;
                    woolly.rotation.z = Math.sin(time * 3) * 0.15;
                    woolly.rotation.y = Math.sin(time * 0.5) * 0.3;
                    bodyGroup.rotation.y = Math.sin(time * 2) * 0.2;
                    headGroup.rotation.z = Math.sin(time * 4) * 0.15;
                    earGroup.children[0].rotation.z = 0.5 + Math.sin(danceTime + 0.3) * 0.3;
                    earGroup.children[1].rotation.z = -0.5 + Math.sin(danceTime) * 0.3;
                    leftArmGroup.rotation.z = 0.3 + Math.sin(danceTime) * 0.6;
                    rightArmGroup.rotation.z = -0.3 + Math.sin(danceTime + Math.PI) * 0.6;
                    legs[0].rotation.x = Math.sin(danceTime) * 0.2;
                    legs[1].rotation.x = Math.sin(danceTime + Math.PI) * 0.2;
                    tailGroup.rotation.y = Math.sin(time * 8) * 0.5;
                }

                renderer.render(scene, camera);
            }

            return {
                start: () => { if (!animationId) animate(); },
                stop: () => { if (animationId) { cancelAnimationFrame(animationId); animationId = null; } },
                dispose: () => {
                    if (animationId) cancelAnimationFrame(animationId);
                    renderer.dispose();
                    container.innerHTML = '';
                }
            };
        }

        let homeWoolly = null;
        let celebrationWoolly = null;

        function initHomeWoolly() {
            homeWoolly = create3DWoolly('woolly-3d-container', 200, 'wave');
            if (homeWoolly) homeWoolly.start();
        }

        function showCelebrationWoolly() {
            const container = document.getElementById('woolly-celebration-container');
            container.innerHTML = '';
            celebrationWoolly = create3DWoolly('woolly-celebration-container', 280, 'dance');
            if (celebrationWoolly) celebrationWoolly.start();
        }

        function hideCelebrationWoolly() {
            if (celebrationWoolly) {
                celebrationWoolly.dispose();
                celebrationWoolly = null;
            }
        }

        document.addEventListener('DOMContentLoaded', initHomeWoolly);
    </script>
</body>
</html>
